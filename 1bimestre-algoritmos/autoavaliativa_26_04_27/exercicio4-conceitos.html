<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 4 - Conceitos</title>
</head>
<body>
    <h2>Verificar Conceito</h2>
    <input type="number" step="0.1" id="nota" placeholder="Nota do aluno">
    <input type="number" id="faltas" placeholder="Número de faltas">
    <button onclick="processarConceito()">Ver Resultado</button>
    <p id="resConceito"></p>

    <script>
        function obterConceitoBase(nota) {
            if (nota >= 9.0) return 'A';
            if (nota >= 7.5) return 'B';
            if (nota >= 5.0) return 'C';
            if (nota >= 4.0) return 'D';
            return 'E';
        }

        function processarConceito() {
            const nota = parseFloat(document.getElementById('nota').value);
            const faltas = parseInt(document.getElementById('faltas').value);
            let conceito = obterConceitoBase(nota);

            if (faltas > 20) {
                const reducao = { 'A': 'B', 'B': 'C', 'C': 'D', 'D': 'E', 'E': 'E' };
                conceito = reducao[conceito];
            }

            document.getElementById('resConceito').innerText = "Conceito Final: " + conceito;
        }
    </script>
</body>
</html>
