<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Salário e Comissão</title>
</head>
<body>

<div class="card">
    <h2>Calculadora de Vendas</h2>
    
    <div class="field">
        <label>Salário Fixo (R$):</label>
        <input type="number" id="salarioFixo" placeholder="Ex: 1500.00" step="0.01">
    </div>

    <div class="field">
        <label>Total de Vendas (R$):</label>
        <input type="number" id="valorVendas" placeholder="Ex: 5000.00" step="0.01">
    </div>

    <button onclick="calcularSalario()">Calcular Salário Final</button>

    <div id="resultado" class="res-box" style="display: none;">
        <div class="res-line">Comissão (4%): <span id="comissao" class="destaque"></span></div>
        <div class="res-line">Salário Final: <span id="salarioTotal" class="destaque"></span></div>
    <script src="salario.js"></script>
    </div>
</div>
</head>
<body>
